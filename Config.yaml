# =====================================================================
# Genghis Khan Y-chromosome ML-Tree Visualization — 配置文件
# 所有路径均支持：绝对路径 / 相对路径（相对于 project.base_dir）
# =====================================================================

project:
  name: "chengjisihan"                                                   # 项目名称
  base_dir: "/mnt/d/Y-成吉思汗项目/2-MLtree/8-ggtree-visual"           # 项目根目录

# --------------------------------------------------------------------- #
# 输入数据                                                               #
# --------------------------------------------------------------------- #
inputs:
  tree_file: "/mnt/d/Y-成吉思汗项目/1-原始数据/data/chengjisihan.treefile"  # IQTree输出树文件
  meta_file: "/mnt/d/Y-成吉思汗项目/1-原始数据/meta/0-chegnjisihan.tsv"    # 样本元数据表
  design_file: "conf/VisualDesign.md"                                    # 科学问题与可视化设计说明/参数

# --------------------------------------------------------------------- #
# 目录结构：相对路径默认相对于 project.base_dir                         #
# --------------------------------------------------------------------- #
paths:
  python_dir: "python"                                   # Python 模块目录
  src_dir: "src"                                         # R 模块目录
  helper_dir: "script"                                   # shell 辅助脚本目录
  conf_dir: "conf"                                       # 配置文件目录
  data_dir: "data"                                       # 参考数据目录
  output_dir: "output/chengjisihan"                      # 项目输出根目录
  output_annotation: "output/chengjisihan/annotation"   # 注释 TSV 输出目录
  output_full_tree: "output/chengjisihan/figures/full_tree"    # 全树图输出目录
  output_subtree: "output/chengjisihan/figures/subtree"        # C2a1a3 子树输出目录
  report_dir: "report"                                   # 报告输出目录

# --------------------------------------------------------------------- #
# 工具路径：集中管理解释器、二进制和环境                                 #
# --------------------------------------------------------------------- #
tools:
  conda_bin: "/home/liuyunhui/miniconda3/bin/conda"      # conda 可执行文件
  python_bin: "/home/liuyunhui/miniconda3/bin/python3"   # Python 解释器
  python_env_prefix: "/home/liuyunhui/miniconda3"        # conda 环境前缀
  rscript_bin: "/usr/bin/Rscript"                        # Rscript 路径

# --------------------------------------------------------------------- #
# 可视化参数                                                             #
# --------------------------------------------------------------------- #
visualization:
  figure_width_mm: 200          # 图像宽度（毫米，短边）
  figure_height_mm: 290         # 图像高度（毫米，长边）
  dpi: 300                      # 输出分辨率
  font_family: "Arial"          # 字体（首选 Arial，不可用时回退 sans）
  font_size_min: 6              # 最小字体（pt）
  font_size_max: 12             # 最大字体（pt）
  tip_label_size_pt: 6          # tip 标签字体大小（pt）
  branch_lwd: 0.3               # 分支线宽
  c2a1a3_focal: true            # 是否突出显示 C2a1a3 支系

# --------------------------------------------------------------------- #
# 运行参数                                                               #
# --------------------------------------------------------------------- #
runtime:
  overwrite: true               # 是否覆盖已有输出
  interactive: false            # 是否开启 R 交互式询问模式
